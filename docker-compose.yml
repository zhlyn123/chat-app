services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-8181}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-chat_app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_DB: ${MYSQL_DB:-chatdb}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret-at-least-32-chars}
    ports:
      - "${APP_PORT:-8181}:${APP_PORT:-8181}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-8181}/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.4
    container_name: chat-app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-change-me}
      MYSQL_DATABASE: ${MYSQL_DB:-chatdb}
      MYSQL_USER: ${MYSQL_USER:-chat_app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: chat-app-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:
